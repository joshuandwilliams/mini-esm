name: CI

# Run on every push and every pull request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Lint/format are enforced locally by pre-commit (with pinned tool versions).
      # CI's job is to prove the tests pass on a clean Linux machine.
      - name: Tests + coverage
        run: pytest --cov=miniesm --cov=reference
